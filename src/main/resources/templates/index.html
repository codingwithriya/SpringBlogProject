<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background-color: #f8fafc;
        }

        .page-header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,.08);
        }

        .table-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,.08);
        }

        .table thead {
            background: #212529;
            color: white;
        }

        .blog-content {
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-btn {
            margin-right: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-center">

        <div>
            <h2 class="fw-bold mb-1">
                Blog Management
            </h2>

            <p class="text-muted mb-0">
                Manage all blog posts from one place
            </p>
        </div>

        <a href="/create" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-plus"></i>
            Create Blog
        </a>

    </div>

    <!-- Table Card -->
    <div class="table-card">

        <table class="table table-hover align-middle mb-0">

            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Content Preview</th>
                <th width="180">Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="blog : ${blogs}">

                <td>
                    <span class="badge bg-secondary"
                          th:text="${blog.id}">
                    </span>
                </td>

                <td class="fw-semibold"
                    th:text="${blog.title}">
                </td>

                <td th:text="${blog.author}">
                </td>

                <td class="blog-content"
                    th:text="${#strings.abbreviate(blog.content,80)}">
                </td>

                <td>

                    <a th:href="@{/edit/{id}(id=${blog.id})}"
                       class="btn btn-warning btn-sm action-btn">
                        <i class="fa-solid fa-pen"></i>
                        Edit
                    </a>

                    <a th:href="@{/delete/{id}(id=${blog.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this blog?')">
                        <i class="fa-solid fa-trash"></i>
                        Delete
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <!-- Empty State -->
        <div class="empty-state"
             th:if="${#lists.isEmpty(blogs)}">

            <h4>No Blogs Found</h4>

            <p>Create your first blog post.</p>

            <a href="/blog/create"
               class="btn btn-primary">
                Create Blog
            </a>

        </div>

    </div>

</div>

</body>
</html>
