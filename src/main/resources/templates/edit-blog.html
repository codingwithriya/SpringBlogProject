<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Blog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background: #f4f6f9;
            min-height: 100vh;
        }

        .blog-card {
            max-width: 850px;
            margin: 50px auto;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        .card-header-custom {
            background: linear-gradient(135deg, #fd7e14, #ffb347);
            color: white;
            padding: 30px;
        }

        .card-body {
            padding: 35px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        textarea {
            min-height: 220px;
            resize: vertical;
        }

        .btn-save {
            border-radius: 12px;
            padding: 12px 28px;
            font-weight: 600;
        }

        .btn-back {
            border-radius: 12px;
            padding: 12px 28px;
        }

        .form-label {
            font-weight: 600;
        }

        .blog-id {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card blog-card">

        <div class="card-header-custom">

            <h2>
                <i class="fa-solid fa-pen-to-square"></i>
                Edit Blog
            </h2>

            <h5 class="mt-2"
                th:text="${blog.title}">
                Blog Title
            </h5>

            <span class="blog-id">
                Blog ID:
                <span th:text="${blog.id}"></span>
            </span>

        </div>

        <div class="card-body">

            <form th:action="@{/save}"
                  th:object="${blog}"
                  method="post">

                <!-- IMPORTANT -->
                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-4">

                    <label class="form-label">
                        Blog Title
                    </label>

                    <input type="text"
                           class="form-control"
                           placeholder="Enter blog title..."
                           th:field="*{title}">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Author Name
                    </label>

                    <input type="text"
                           class="form-control"
                           placeholder="Enter author name..."
                           th:field="*{author}">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Blog Content
                    </label>

                    <textarea class="form-control"
                              placeholder="Write your blog content here..."
                              th:field="*{content}">
                    </textarea>

                </div>

                <div class="d-flex justify-content-end gap-2">

                    <a href="/index"
                       class="btn btn-outline-secondary btn-back">
                        <i class="fa-solid fa-arrow-left"></i>
                        Back
                    </a>

                    <button type="submit"
                            class="btn btn-warning btn-save">

                        <i class="fa-solid fa-floppy-disk"></i>
                        Update Blog

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
